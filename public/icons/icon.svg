<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>

  <!-- Grid lines (subtle nexus pattern) -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#333" stroke-width="2"/>

  <!-- Four cards representing the game attributes -->
  <!-- Top: Red triangle card -->
  <rect x="218" y="100" width="76" height="76" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <polygon points="256,115 280,160 232,160" fill="#ef4444"/>

  <!-- Right: Blue circle card -->
  <rect x="336" y="218" width="76" height="76" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <circle cx="374" cy="256" r="22" fill="#3b82f6"/>

  <!-- Bottom: Yellow square card -->
  <rect x="218" y="336" width="76" height="76" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <rect x="240" y="355" width="32" height="32" rx="4" fill="#eab308"/>

  <!-- Left: Green cross card -->
  <rect x="100" y="218" width="76" height="76" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <path d="M126,248 h12 v-12 h8 v12 h12 v8 h-12 v12 h-8 v-12 h-12z" fill="#22c55e"/>

  <!-- Center: NN monogram -->
  <rect x="218" y="218" width="76" height="76" rx="10" fill="#e5e5e5"/>
  <text x="256" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="900" fill="#1a1a1a" letter-spacing="-2">NN</text>
</svg>
