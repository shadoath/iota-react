<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NodusNexus - Offline</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f0ede6;
        --text: #1a1a1a;
        --muted: #6b7280;
        --accent: #22c55e;
        --card-bg: #ffffff;
        --shadow: rgba(0, 0, 0, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --text: #f0ede6;
          --muted: #9ca3af;
          --card-bg: #2a2a2a;
          --shadow: rgba(0, 0, 0, 0.3);
        }
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .card {
        background: var(--card-bg);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px var(--shadow);
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .brand {
        color: var(--accent);
      }
      p {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.9;
      }
      button:active {
        opacity: 0.8;
      }
      .hint {
        color: var(--muted);
        font-size: 0.8rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#x1F4E1;</div>
      <h1><span class="brand">NodusNexus</span></h1>
      <p>
        You're currently offline. Check your internet connection and try again to load the game.
      </p>
      <button id="retry-btn">Try Again</button>
      <p class="hint">If you've played before, the game may be cached and available offline.</p>
    </div>
    <script>
      document.getElementById("retry-btn").addEventListener("click", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
